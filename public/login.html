<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Codzy</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="shortcut icon" href="/logo.ico">
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="description" content="Log in to your Codzy client dashboard to manage projects and templates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div class="loading-screen" aria-hidden="true">
        <div class="loading-spinner"></div>
        <div class="loading-text">COD<span>ZY</span></div>
        <div class="loading-recommend">Booting up something extraordinary...</div>
    </div>
    <div class="page-transition" aria-hidden="true"></div>
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-ring" aria-hidden="true"></div>
    <div class="mobile-overlay" aria-hidden="true"></div>

    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="container">
            <a href="/home" class="nav-logo"><img src="images/logo.png" alt="Codzy Logo" class="logo-img"></a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/about">About</a>
                <a href="/templates">Templates</a>
                <a href="/contact">Contact</a>
                <a href="/login" class="active">Login</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <div class="toggle-thumb">☀</div>
                </button>
                <a href="/cart" class="nav-cart" aria-label="Cart">🛒<span class="cart-count"
                        style="display:none;">0</span></a>
                <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-bg-shapes" aria-hidden="true">
            <div class="bg-shape shape-1"></div>
            <div class="bg-shape shape-2"></div>
            <div class="bg-shape shape-3"></div>
        </div>

        <div class="login-card glass-card reveal-scale">
            <div class="login-header">
                <div class="login-logo">COD<span class="text-gradient">ZY</span></div>
                <h1>Welcome Back</h1>
                <p>Sign in to your client dashboard</p>
            </div>

            <form class="login-form" id="login-form" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="login-email" required autocomplete="email" placeholder=" " />
                        <label for="login-email">Email Address</label>
                        <div class="input-glow"></div>
                    </div>
                    <span class="form-error" id="email-error"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="login-password" required autocomplete="current-password"
                            placeholder=" " />
                        <label for="login-password">Password</label>
                        <div class="input-glow"></div>
                    </div>
                    <span class="form-error" id="password-error"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" />
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg login-btn">Sign In</button>

                <div class="login-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn glass-card" id="googleLoginBtn" title="Sign in with Google">
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        </svg>
                    </button>
                    <button type="button" class="social-btn glass-card"
                        onclick="showToast('GitHub login coming soon', '🔗')">⌘</button>
                    <button type="button" class="social-btn glass-card"
                        onclick="showToast('LinkedIn login coming soon', '🔗')">in</button>
                </div>

                <p class="login-signup">
                    Don't have an account? <a href="/signup">Sign Up</a>
                </p>
            </form>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
